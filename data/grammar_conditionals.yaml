section_id: 3
columns:
  - 種類
  - if節
  - 主節
  - 時間
  - 現実度
  - 例文
  - 日本語
  - コアイメージ
rows:
  - 種類: ゼロ条件
    if節: If + V/V-s
    主節: V/V-s
    時間: 一般事実
    現実度: 高い
    例文: If water freezes, it expands.
    日本語: 水は凍ると膨張します。
    コアイメージ: いつもそうなる
  - 種類: 第1条件
    if節: If + V/V-s
    主節: will/can/may + V
    時間: 未来
    現実度: 高め
    例文: If it rains, we will cancel the event.
    日本語: 雨ならイベントを中止します。
    コアイメージ: 起こりうる未来
  - 種類: 第2条件
    if節: If + V-ed/did
    主節: would/could/might + V
    時間: 現在・未来の仮定
    現実度: 低め
    例文: If I had more time, I could help you.
    日本語: もっと時間があれば手伝えるのに。
    コアイメージ: もし今/未来が違ったら
  - 種類: 第3条件
    if節: If + had done
    主節: would/could/might have done
    時間: 過去の仮定
    現実度: 実際とは違う
    例文: If you had asked me, I would have helped you.
    日本語: 聞いてくれていたら手伝ったのに。
    コアイメージ: もし過去が違ったら
  - 種類: 混合条件
    if節: If + had done
    主節: would/could/might + V
    時間: 過去原因→現在結果
    現実度: 実際とは違う
    例文: If she had studied accounting, she could handle this task now.
    日本語: 会計を勉強していたら、今この仕事をこなせるのに。
    コアイメージ: 過去が違えば今が違う
