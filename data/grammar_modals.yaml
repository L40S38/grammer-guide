section_id: 4
columns:
  - 形
  - 一般形
  - 主な意味
  - 時間
  - 例文
  - 日本語
  - ニュアンス
rows:
  - 形: can + V
    一般形: can V
    主な意味: できる・可能
    時間: 現在・未来
    例文: We can help you.
    日本語: お手伝いできます。
    ニュアンス: 能力・可能性。直接的
  - 形: could + V
    一般形: could V
    主な意味: できるかもしれない・丁寧
    時間: 現在・未来
    例文: If you could attend, please let us know.
    日本語: 出席できるようでしたらお知らせください。
    ニュアンス: 丁寧・控えめな可能性
  - 形: may + V
    一般形: may V
    主な意味: かもしれない・してもよい
    時間: 現在・未来
    例文: The plan may change.
    日本語: 計画は変更されるかもしれません。
    ニュアンス: 可能性・許可。ややフォーマル
  - 形: might + V
    一般形: might V
    主な意味: かもしれない
    時間: 現在・未来
    例文: It might arrive late.
    日本語: 遅れて到着するかもしれません。
    ニュアンス: mayより控えめ
  - 形: will + V
    一般形: will V
    主な意味: するつもりだ・するだろう
    時間: 未来
    例文: We will contact you soon.
    日本語: すぐに連絡します。
    ニュアンス: 意志・予測
  - 形: would + V
    一般形: would V
    主な意味: するだろう・仮定ならする
    時間: 現在・未来/仮定
    例文: I would recommend this option.
    日本語: この選択肢をおすすめします。
    ニュアンス: 丁寧な提案・仮定
  - 形: should + V
    一般形: should V
    主な意味: すべき・するはず
    時間: 現在・未来
    例文: It should arrive today.
    日本語: 今日届くはずです。
    ニュアンス: 助言・見込み
  - 形: must + V
    一般形: must V
    主な意味: しなければならない・に違いない
    時間: 現在・未来
    例文: You must wear a badge.
    日本語: バッジを着用しなければなりません。
    ニュアンス: 義務・強い推量
