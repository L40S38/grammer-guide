section_id: 2
columns:
  - 形
  - 一般形
  - 時間
  - 一点/期間
  - 状態
  - 例文
  - 日本語
  - TOEICでの見方
rows:
  - 形: 現在形
    一般形: V / V-s
    時間: 現在・一般
    一点/期間: 習慣・一般
    状態: 事実・習慣
    例文: The office opens at 9.
    日本語: そのオフィスは9時に開きます。
    TOEICでの見方: 規則・事実
  - 形: 過去形
    一般形: V-ed / did
    時間: 過去
    一点/期間: 一点
    状態: 過去の出来事
    例文: The office closed early yesterday.
    日本語: そのオフィスは昨日早く閉まりました。
    TOEICでの見方: yesterdayなどと相性
  - 形: 未来表現
    一般形: will + V
    時間: 未来
    一点/期間: 一点/期間
    状態: 予定・予測
    例文: We will send the invoice tomorrow.
    日本語: 明日請求書を送ります。
    TOEICでの見方: 未来の予定・意志
  - 形: 現在進行形
    一般形: am/is/are + V-ing
    時間: 現在
    一点/期間: 期間
    状態: 今している最中
    例文: She is reviewing the file.
    日本語: 彼女は今ファイルを確認しています。
    TOEICでの見方: 進行中・近い予定
  - 形: 過去進行形
    一般形: was/were + V-ing
    時間: 過去
    一点/期間: 期間
    状態: 過去のある時点で進行中
    例文: They were preparing the room.
    日本語: 彼らは部屋を準備していました。
    TOEICでの見方: 背景動作
  - 形: 現在完了
    一般形: have/has + done
    時間: 過去→現在
    一点/期間: 期間/結果
    状態: 完了・経験・結果
    例文: We have received your application.
    日本語: 申請書を受け取りました。
    TOEICでの見方: 今に関係がある
  - 形: 現在完了進行形
    一般形: have/has been + V-ing
    時間: 過去→現在
    一点/期間: 期間
    状態: 継続中・途中経過
    例文: We have been reviewing your application.
    日本語: 申請書を確認しているところです。
    TOEICでの見方: ずっと続いている
  - 形: 過去完了
    一般形: had + done
    時間: 過去より前→過去
    一点/期間: 一点/結果
    状態: 過去の基準点までに完了
    例文: The train had left when we arrived.
    日本語: 私たちが着いた時、電車は出発していました。
    TOEICでの見方: 過去の過去
  - 形: 過去完了進行形
    一般形: had been + V-ing
    時間: 過去より前→過去
    一点/期間: 期間
    状態: 過去の基準点まで継続
    例文: They had been waiting for an hour.
    日本語: 彼らは1時間待っていました。
    TOEICでの見方: 過去までの継続
  - 形: 未来完了
    一般形: will have + done
    時間: 現在→未来
    一点/期間: 期間/結果
    状態: 未来の時点までに完了
    例文: We will have completed the work by Friday.
    日本語: 金曜までに仕事を終えているでしょう。
    TOEICでの見方: by Fridayなどが目印
