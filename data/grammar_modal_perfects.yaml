rows:
  - 形: may have done
    一般形: may have done
    主な意味: 〜したかもしれない
    時間: 過去
    例文: He may have forgotten it.
    日本語: 彼はそれを忘れた可能性があります。
    ニュアンス: 過去推量。可能性やや高め
  - 形: might have done
    一般形: might have done
    主な意味: 〜したかもしれない
    時間: 過去
    例文: He might have forgotten it.
    日本語: 彼はそれを忘れたかもしれません。
    ニュアンス: 過去推量。控えめ
  - 形: could have done
    一般形: could have done
    主な意味: 〜できたかもしれない／できたのに
    時間: 過去
    例文: We could have finished it earlier.
    日本語: もっと早く終えられたかもしれません。
    ニュアンス: 可能性・機会
  - 形: would have done
    一般形: would have done
    主な意味: 〜しただろうに
    時間: 過去
    例文: I would have joined the meeting.
    日本語: 会議に参加しただろうに。
    ニュアンス: 過去の反実仮想
  - 形: should have done
    一般形: should have done
    主な意味: 〜すべきだった
    時間: 過去
    例文: You should have checked it.
    日本語: それを確認すべきでした。
    ニュアンス: 後悔・助言
  - 形: must have done
    一般形: must have done
    主な意味: 〜したに違いない
    時間: 過去
    例文: She must have missed it.
    日本語: 彼女はそれを見落としたに違いありません。
    ニュアンス: 強い推量
  - 形: can't have done
    一般形: can't have done
    主な意味: 〜したはずがない
    時間: 過去
    例文: He can't have approved it.
    日本語: 彼がそれを承認したはずがありません。
    ニュアンス: 強い否定推量
